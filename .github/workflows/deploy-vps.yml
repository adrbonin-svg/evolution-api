name: 🚀 Deploy → crm.autoprimetech.com.br

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Forçar deploy mesmo sem mudanças'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ─── Verificar qualidade do código ──────────────────────────────
  quality:
    name: 🔍 Lint & Build Check
    runs-on: ubuntu-latest
    steps:
      - name: ✅ Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 Instalar dependências
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint:check
        continue-on-error: true

      - name: 🗄️ Gerar Prisma Client
        run: npm run db:generate
        env:
          DATABASE_PROVIDER: postgresql

      - name: 🏗️ Build
        run: npm run build
        env:
          DATABASE_PROVIDER: postgresql
        continue-on-error: true

  # ─── Deploy no VPS Hostinger ────────────────────────────────────
  deploy:
    name: 🚀 Deploy VPS Hostinger
    runs-on: ubuntu-latest
    needs: quality
    if: always()
    environment: production

    steps:
      - name: ✅ Checkout
        uses: actions/checkout@v4

      - name: 🚀 Deploy via SSH (appleboy)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          timeout: 300s
          command_timeout: 20m
          script: |
            set -e
            DEPLOY_PATH=/var/www/evolution-api

            echo "=================================="
            echo "Deploy iniciado: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "Diretorio: $DEPLOY_PATH"
            echo "=================================="

            cd $DEPLOY_PATH

            # Backup do .env
            if [ -f .env ]; then
              cp .env .env.backup.$(date +%Y%m%d_%H%M%S)
              echo "Backup do .env criado"
            fi

            # Atualizar codigo
            echo "Atualizando codigo..."
            git fetch origin main
            git reset --hard origin/main

            # Rebuild containers
            echo "Rebuild dos containers..."
            docker compose -f docker-compose.prod.yml pull --quiet
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            # Aguardar inicializar
            echo "Aguardando inicializacao..."
            sleep 20

            # Health check
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080 2>/dev/null || echo "000")
            echo "Evolution API HTTP Status: $HTTP_STATUS"

            # Limpeza
            docker image prune -f --filter "until=24h" > /dev/null 2>&1 || true

            echo "=================================="
            echo "Deploy concluido com sucesso!"
            echo "URL: https://crm.autoprimetech.com.br"
            echo "=================================="

      - name: 📊 Status dos containers
        if: always()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'

      - name: 📣 Notificar WhatsApp — Sucesso
        if: success()
        run: |
          curl -s -X POST "${{ secrets.EVOLUTION_API_URL }}/message/sendText/${{ secrets.EVOLUTION_INSTANCE_NAME }}" \
            -H "apikey: ${{ secrets.EVOLUTION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"number\":\"${{ secrets.NOTIFY_WHATSAPP_NUMBER }}\",\"text\":\"Deploy realizado com sucesso!\nCommit: ${{ github.sha }}\nPor: ${{ github.actor }}\nURL: https://crm.autoprimetech.com.br\"}" \
            || echo "Notificacao WhatsApp ignorada (opcional)"

      - name: 📣 Notificar WhatsApp — Falha
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.EVOLUTION_API_URL }}/message/sendText/${{ secrets.EVOLUTION_INSTANCE_NAME }}" \
            -H "apikey: ${{ secrets.EVOLUTION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"number\":\"${{ secrets.NOTIFY_WHATSAPP_NUMBER }}\",\"text\":\"FALHA no Deploy!\nCommit: ${{ github.sha }}\nPor: ${{ github.actor }}\nLog: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            || echo "Notificacao WhatsApp ignorada (opcional)"
